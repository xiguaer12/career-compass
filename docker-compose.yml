services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-career_compass}
      MYSQL_USER: ${MYSQL_USER:-career_compass}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-career_compass_pwd}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-career_compass_root_pwd}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-career_compass_redis_pwd}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-admin-token}
      JWT_SECRET: ${JWT_SECRET:-career-compass-local-secret-change-me}
      STUDENT_EMAIL_PATTERN: ${STUDENT_EMAIL_PATTERN:-^\d{10}@st\.usst\.edu\.cn$}
      GRADUATION_YEARS: ${GRADUATION_YEARS:-2025,2026,2027}
      EXPOSE_DEV_VERIFICATION_CODES: ${EXPOSE_DEV_VERIFICATION_CODES:-true}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-career_compass}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-career_compass}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-career_compass_pwd}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
