services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-career_compass}
      MYSQL_USER: ${MYSQL_USER:-career_compass}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-career_compass_pwd}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-career_compass_root_pwd}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-career_compass_redis_pwd}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-admin-token}
      JWT_SECRET: ${JWT_SECRET:-career-compass-local-secret-change-me}
      REQUIRE_STRONG_SECRETS: ${REQUIRE_STRONG_SECRETS:-false}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      STUDENT_EMAIL_PATTERN: ${STUDENT_EMAIL_PATTERN:-^\d{10}@st\.usst\.edu\.cn$}
      MAIL_VERIFICATION_ENABLED: ${MAIL_VERIFICATION_ENABLED:-true}
      MAIL_CODE_TTL_MINUTES: ${MAIL_CODE_TTL_MINUTES:-10}
      MAIL_CODE_COOLDOWN_SECONDS: ${MAIL_CODE_COOLDOWN_SECONDS:-60}
      MAIL_CODE_MAX_SENDS_PER_WINDOW: ${MAIL_CODE_MAX_SENDS_PER_WINDOW:-3}
      MAIL_CODE_MAX_ATTEMPTS: ${MAIL_CODE_MAX_ATTEMPTS:-5}
      QQ_MAIL_HOST: ${QQ_MAIL_HOST:-smtp.qq.com}
      QQ_MAIL_PORT: ${QQ_MAIL_PORT:-465}
      QQ_MAIL_USERNAME: ${QQ_MAIL_USERNAME:-}
      QQ_MAIL_SMTP_AUTH_CODE: ${QQ_MAIL_SMTP_AUTH_CODE:-}
      AUTO_CRAWL_ENABLED: ${AUTO_CRAWL_ENABLED:-true}
      AUTO_CRAWL_INITIAL_DELAY_MINUTES: ${AUTO_CRAWL_INITIAL_DELAY_MINUTES:-5}
      AUTO_CRAWL_INTERVAL_MINUTES: ${AUTO_CRAWL_INTERVAL_MINUTES:-60}
      CRAWL_INSECURE_SSL_FALLBACK_ENABLED: ${CRAWL_INSECURE_SSL_FALLBACK_ENABLED:-true}
      CHART_AUTO_REFRESH_ENABLED: ${CHART_AUTO_REFRESH_ENABLED:-true}
      CHART_AUTO_REFRESH_INITIAL_DELAY_MINUTES: ${CHART_AUTO_REFRESH_INITIAL_DELAY_MINUTES:-10}
      CHART_AUTO_REFRESH_INTERVAL_MINUTES: ${CHART_AUTO_REFRESH_INTERVAL_MINUTES:-720}
      COMMUNITY_UPLOAD_DIR: ${COMMUNITY_UPLOAD_DIR:-/app/uploads/community}
      COMMUNITY_UPLOAD_MAX_IMAGE_MB: ${COMMUNITY_UPLOAD_MAX_IMAGE_MB:-5}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-career_compass}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-career_compass}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-career_compass_pwd}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-career_compass_redis_pwd}
    volumes:
      - ./uploads/community:/app/uploads/community
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
